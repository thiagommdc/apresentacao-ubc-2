<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Analogia</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(15, 44, 89, 0.14);
      background: #fff;
    }
  </style>
</head>
<body>
  <img src="../imagens/slide_analogia.png" alt="Slide de analogia">

  <script>
    window.parent?.postMessage({
      type: "resize",
      url: window.location.href,
      height: 720
    }, "*");
  </script>
</body>
</html>
