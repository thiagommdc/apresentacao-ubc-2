<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Fluxo QB</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(249, 181, 114, 0.2), transparent 24rem),
        linear-gradient(180deg, #08111f 0%, #13233f 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 18px;
      background: #000;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }
  </style>
</head>
<body>
  <video controls playsinline preload="auto">
    <source src="../imagens/Fluxo_qb.mkv" type="video/x-matroska">
    <source src="../imagens/Fluxo_qb.mp4" type="video/mp4">
    Seu navegador nao conseguiu carregar o video.
  </video>

  <script>
    window.parent?.postMessage({
      type: "resize",
      url: window.location.href,
      height: 720
    }, "*");
  </script>
</body>
</html>
