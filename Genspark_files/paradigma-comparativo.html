<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A mudança de paradigma</title>
  <style>
    :root {
      --bg: #08111f;
      --text: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
    }

    .slide {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(249, 181, 114, 0.24), transparent 24rem),
        linear-gradient(180deg, #11213f 0%, #08111f 100%);
    }

    .slide img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(8, 17, 31, 0.9) 0%, rgba(8, 17, 31, 0.35) 20%, rgba(8, 17, 31, 0) 42%),
        linear-gradient(0deg, rgba(8, 17, 31, 0.75) 0%, rgba(8, 17, 31, 0) 18%);
      pointer-events: none;
    }

    .title-block {
      position: absolute;
      top: 42px;
      left: 44px;
      right: 44px;
      z-index: 1;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      color: var(--text);
      font-size: 46px;
      font-weight: 800;
      line-height: 1.05;
      text-shadow: 0 10px 30px rgba(8, 17, 31, 0.45);
    }
  </style>
</head>
<body>
  <main class="slide">
    <img src="../imagens/comparativo.png" alt="Comparativo entre os paradigmas atual e proposto">
    <div class="overlay"></div>
    <header class="title-block">
      <h1>A mudança de paradigma</h1>
    </header>
  </main>
</body>
</html>
